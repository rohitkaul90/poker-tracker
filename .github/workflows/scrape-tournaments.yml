name: Scrape Tournament Listings

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:      # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tournament scraper
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPE_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://mxjdroihsoihaughopxi.supabase.co/functions/v1/scrape-tournaments")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response: $body"
          echo "HTTP status: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Scraper failed — check Edge Function logs in Supabase dashboard"
            exit 1
          fi

          echo "Success: $(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{d[\"scraped\"]} tournaments scraped')" 2>/dev/null || echo "$body")"
