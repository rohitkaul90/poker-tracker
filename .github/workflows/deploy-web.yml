name: Deploy Web

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'

  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p lib/config
          cat > lib/config/supabase_config.dart << DART
          class SupabaseConfig {
            static const String url = '${SUPABASE_URL}';
            static const String anonKey = '${SUPABASE_ANON_KEY}';
          }
          DART

      - name: Build web (release)
        run: flutter build web --release --base-href /

      - name: Preserve CNAME and deploy to docs/
        run: |
          CNAME_CONTENT=$(cat docs/CNAME 2>/dev/null || echo "tablelab.app")
          rm -rf docs/*
          cp -r build/web/. docs/
          echo "$CNAME_CONTENT" > docs/CNAME
          touch docs/.nojekyll

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy web build [skip ci]"
            git push
          fi
