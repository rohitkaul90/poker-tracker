<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TableLab — poker bankroll tracker">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TableLab">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TableLab</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111811;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #111811;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }

    #splash-icon-wrap {
      width: 100px;
      height: 100px;
      background: #1B5E20;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }

    #splash-icon-wrap img {
      width: 68px;
      height: 68px;
      object-fit: contain;
    }

    #splash-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }

    #splash-tagline {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
    }

    /* Indeterminate progress bar at the bottom */
    #splash-bar-track {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    #splash-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 35%;
      background: #4CAF50;
      border-radius: 1px;
      animation: splash-slide 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes splash-slide {
      0%   { left: -35%; }
      100% { left: 100%; }
    }
  </style>

  <script src="sql-wasm.js"></script>
  <script>
    window.SQL = undefined;
    initSqlJs({ locateFile: file => file }).then(SQL => { window.SQL = SQL; });
  </script>
</head>
<body>
  <!-- Branded splash shown while Flutter initialises -->
  <div id="splash">
    <div id="splash-icon-wrap">
      <img src="icons/Icon-192.png" alt="TableLab">
    </div>
    <div id="splash-title">TableLab</div>
    <div id="splash-tagline">Your edge, quantified.</div>
    <div id="splash-bar-track">
      <div id="splash-bar"></div>
    </div>
  </div>

  <script>
    // Fade out the HTML splash as soon as Flutter renders its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function () { splash.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
